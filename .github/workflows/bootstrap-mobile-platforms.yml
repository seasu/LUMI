name: Bootstrap iOS/Android Folders

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    name: Generate iOS and Android folders
    runs-on: macos-latest
    env:
      FLUTTER_VERSION: "3.29.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate native platforms
        run: flutter create . --platforms=ios,android

      - name: Commit generated folders
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios android
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: bootstrap ios/android platform folders"
          git push origin HEAD
