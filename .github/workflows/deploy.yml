name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  version:
    name: Bump Version
    needs: test
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version from commit message
        id: bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')

          if echo "$COMMIT_MSG" | grep -q '^feat'; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif echo "$COMMIT_MSG" | grep -q '^fix'; then
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_BUILD=$((BUILD + 1))
          sed -i "s/^version: .*/version: ${NEW_VERSION}+${NEW_BUILD}/" pubspec.yaml
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

  build:
    name: Build Web
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify Secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          check() { [ -n "$2" ] && echo "✓ $1" || echo "✗ $1 (missing)"; }
          check "FIREBASE_API_KEY"            "$FIREBASE_API_KEY"
          check "FIREBASE_AUTH_DOMAIN"        "$FIREBASE_AUTH_DOMAIN"
          check "FIREBASE_PROJECT_ID"         "$FIREBASE_PROJECT_ID"
          check "FIREBASE_STORAGE_BUCKET"     "$FIREBASE_STORAGE_BUCKET"
          check "FIREBASE_MESSAGING_SENDER_ID" "$FIREBASE_MESSAGING_SENDER_ID"
          check "FIREBASE_APP_ID"             "$FIREBASE_APP_ID"
          check "GOOGLE_CLIENT_ID"            "$GOOGLE_CLIENT_ID"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Inject build version into index.html
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/__BUILD_VERSION__/$GIT_SHA/g" web/index.html

      - name: Build Web
        run: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          APP_SEMVER=${APP_VERSION%%+*}
          APP_BUILD=${APP_VERSION##*+}
          flutter build web --release \
            --pwa-strategy=none \
            --base-href "/LUMI/" \
            --dart-define=APP_SEMVER="$APP_SEMVER" \
            --dart-define=APP_BUILD_NUMBER="$APP_BUILD" \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }} \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
