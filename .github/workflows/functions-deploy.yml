name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
  workflow_dispatch: # 允許從 GitHub Actions UI 手動觸發

jobs:
  deploy:
    name: Deploy Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Build TypeScript
        run: npm run build
        working-directory: functions

      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Show deploy service account (for IAM debugging)
        run: python3 -c "import json; print(json.load(open('/tmp/sa.json'))['client_email'])"

      # IAM for this SA (project lumi-309ff): must allow Firebase CLI deploy, including
      # cloudresourcemanager.googleapis.com GET on the project (403 = missing roles).
      # Typical fix: grant this service account one of:
      # - roles/firebase.admin (Firebase Admin), or
      # - roles/editor (broader; use only if acceptable for your org)
      # Also ensure the SA is not disabled and is the same JSON as in FIREBASE_SERVICE_ACCOUNT.

      # Do not run `functions:secrets:set` here: it requires Service Usage + Secret Manager
      # permissions that the deploy SA often lacks (403 on serviceusage.googleapis.com).
      # Configure GEMINI_API_KEY once in Firebase (Console or CLI with an admin account).
      #
      # Cloud Functions Gen2 (v2 SDK), region asia-east1 — align with App Engine (lumi-309ff).
      #
      # One-time (project owner): if deploy still asks to enable APIs, enable manually:
      # - Cloud Build: https://console.cloud.google.com/apis/library/cloudbuild.googleapis.com?project=lumi-309ff
      # - Artifact Registry: https://console.cloud.google.com/apis/library/artifactregistry.googleapis.com?project=lumi-309ff
      #
      # --force on deploy: CLI applies Artifact Registry cleanup policy for build artifacts;
      # without it, deploy can exit 1 after functions succeeded.

      - name: Deploy Cloud Functions (with trigger migration fallback)
        working-directory: functions
        run: |
          MAX_ATTEMPTS=5
          ATTEMPT=1

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "Deploy attempt ${ATTEMPT}/${MAX_ATTEMPTS}"

            set +e
            DEPLOY_OUTPUT=$(
              GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
                npx firebase deploy --only functions \
                  --project lumi-309ff --non-interactive --force 2>&1
            )
            DEPLOY_STATUS=$?
            set -e

            echo "$DEPLOY_OUTPUT"

            if [ "$DEPLOY_STATUS" -eq 0 ]; then
              exit 0
            fi

            MIGRATION_TARGETS=$(
              DEPLOY_OUTPUT="$DEPLOY_OUTPUT" python3 -c 'import os, re; text=os.environ.get("DEPLOY_OUTPUT", ""); pattern=re.compile(r"\[([^(]+)\(([^)]+)\)\]\s+Changing from an HTTPS function to a background triggered function is not allowed"); seen=sorted({(name.strip(), region.strip()) for name, region in pattern.findall(text)}); print("\n".join(f"{name}|{region}" for name, region in seen))'
            )

            if [ -z "$MIGRATION_TARGETS" ]; then
              exit "$DEPLOY_STATUS"
            fi

            echo "Detected trigger-type migration conflict(s)."
            while IFS='|' read -r FUNCTION_NAME FUNCTION_REGION; do
              [ -z "$FUNCTION_NAME" ] && continue
              echo "Deleting legacy function ${FUNCTION_NAME}(${FUNCTION_REGION}) then retrying."
              GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
                npx firebase functions:delete "$FUNCTION_NAME" \
                  --region "$FUNCTION_REGION" --project lumi-309ff --force
            done <<< "$MIGRATION_TARGETS"

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Exceeded retry limit (${MAX_ATTEMPTS}) while resolving trigger migration conflicts."
          exit 1

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa.json
