name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
  workflow_dispatch: # 允許從 GitHub Actions UI 手動觸發

jobs:
  deploy:
    name: Deploy Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Inject backend version from package.json into serverInfo.ts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Injecting FUNCTIONS_VERSION=${VERSION}"
          sed -i "s/export const FUNCTIONS_VERSION = \".*\"/export const FUNCTIONS_VERSION = \"${VERSION}\"/" src/serverInfo.ts
        working-directory: functions

      - name: Build TypeScript
        run: npm run build
        working-directory: functions

      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Show deploy service account
        run: python3 -c "import json; print(json.load(open('/tmp/sa.json'))['client_email'])"

      # Diagnostic: exchange the SA key for an access token directly, so Google's
      # real error surfaces (e.g. invalid_grant = key deleted/wrong) instead of
      # firebase-tools' generic "Failed to authenticate". google-auth-library is a
      # functions dependency, so it resolves from functions/node_modules.
      - name: Verify service account key can obtain a token
        working-directory: functions
        run: |
          node -e '
            const fs = require("fs");
            const { GoogleAuth } = require("google-auth-library");
            const key = JSON.parse(fs.readFileSync("/tmp/sa.json", "utf8"));
            console.log("private_key_id:", key.private_key_id);
            console.log("project_id:", key.project_id);
            const auth = new GoogleAuth({
              keyFilename: "/tmp/sa.json",
              scopes: ["https://www.googleapis.com/auth/cloud-platform"],
            });
            auth.getAccessToken()
              .then((t) => { console.log("ACCESS TOKEN OK (prefix):", String(t).slice(0, 10)); })
              .catch((e) => { console.error("TOKEN EXCHANGE FAILED:", e.message); process.exit(1); });
          '

      # Authentication: uses FIREBASE_SERVICE_ACCOUNT secret (service account JSON key).
      # If this step fails with "Failed to authenticate", the key in the secret has been
      # deleted or revoked in GCP. Fix:
      #   GCP Console → IAM & Admin → Service Accounts → github-actions@lumi-309ff.iam.gserviceaccount.com
      #   → Keys → Add Key → Create new key (JSON) → update FIREBASE_SERVICE_ACCOUNT GitHub Secret.
      #
      # Cloud Functions Gen2 (v2 SDK), region asia-east1.
      # Apple IAP secrets are managed via Firebase Secret Manager (not this workflow).

      # Runtime env for Cloud Functions — written to .env.lumi-309ff before deploy.
      - name: Write runtime env for Firebase deploy
        working-directory: functions
        run: |
          rm -f .env.lumi-309ff
          touch .env.lumi-309ff
          if [ -n "${{ vars.GEMINI_VISION_MODEL }}" ]; then
            printf '%s\n' 'GEMINI_VISION_MODEL=${{ vars.GEMINI_VISION_MODEL }}' >> .env.lumi-309ff
          fi
          if [ -n "${{ vars.GEMINI_EMBEDDING_MODEL }}" ]; then
            printf '%s\n' 'GEMINI_EMBEDDING_MODEL=${{ vars.GEMINI_EMBEDDING_MODEL }}' >> .env.lumi-309ff
          fi

      - name: Deploy Cloud Functions (with trigger migration fallback)
        working-directory: functions
        run: |
          MAX_ATTEMPTS=5
          ATTEMPT=1

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "Deploy attempt ${ATTEMPT}/${MAX_ATTEMPTS}"

            set +e
            DEPLOY_OUTPUT=$(
              GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
                npx firebase deploy --only functions \
                  --project lumi-309ff --non-interactive --force 2>&1
            )
            DEPLOY_STATUS=$?
            set -e

            echo "$DEPLOY_OUTPUT"

            if [ "$DEPLOY_STATUS" -eq 0 ]; then
              exit 0
            fi

            MIGRATION_TARGETS=$(
              DEPLOY_OUTPUT="$DEPLOY_OUTPUT" python3 -c 'import os,re; t=os.environ.get("DEPLOY_OUTPUT",""); t=re.sub(r"\x1B\[[0-?]*[ -/]*[@-~]","",t); p=re.compile(r"^Error:\s+\[([^\(\]\r\n]+)\(([^)\r\n]+)\)\]\s+Changing from an HTTPS function to a background triggered function is not allowed", re.MULTILINE); q=sorted({(a.strip(),b.strip()) for a,b in p.findall(t)}); print("\n".join(f"{a}|{b}" for a,b in q if re.fullmatch(r"[A-Za-z][A-Za-z0-9_-]*",a) and re.fullmatch(r"[a-z0-9-]+",b)))'
            )

            if [ -z "$MIGRATION_TARGETS" ]; then
              exit "$DEPLOY_STATUS"
            fi

            echo "Detected trigger-type migration conflict(s)."
            while IFS='|' read -r FUNCTION_NAME FUNCTION_REGION; do
              [ -z "$FUNCTION_NAME" ] && continue
              echo "Deleting legacy function ${FUNCTION_NAME}(${FUNCTION_REGION}) then retrying."
              set +e
              DELETE_OUTPUT=$(
                GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
                  npx firebase functions:delete "$FUNCTION_NAME" \
                    --region "$FUNCTION_REGION" --project lumi-309ff --force 2>&1
              )
              DELETE_STATUS=$?
              set -e

              echo "$DELETE_OUTPUT"

              if [ "$DELETE_STATUS" -ne 0 ] && \
                [[ "$DELETE_OUTPUT" != *"The specified filters do not match any existing functions"* ]] && \
                [[ "$DELETE_OUTPUT" != *"do not match any existing functions"* ]]; then
                echo "Failed to delete legacy function ${FUNCTION_NAME}(${FUNCTION_REGION})."
                exit "$DELETE_STATUS"
              fi
            done <<< "$MIGRATION_TARGETS"

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Exceeded retry limit (${MAX_ATTEMPTS}) while resolving trigger migration conflicts."
          exit 1

      - name: Deploy Firestore Rules
        working-directory: functions
        run: |
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            npx firebase deploy --only firestore:rules \
              --project lumi-309ff --non-interactive

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa.json
