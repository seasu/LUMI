name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
  workflow_dispatch: # 允許從 GitHub Actions UI 手動觸發

jobs:
  deploy:
    name: Deploy Functions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Inject backend version from package.json into serverInfo.ts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Injecting FUNCTIONS_VERSION=${VERSION}"
          sed -i "s/export const FUNCTIONS_VERSION = \".*\"/export const FUNCTIONS_VERSION = \"${VERSION}\"/" src/serverInfo.ts
        working-directory: functions

      - name: Build TypeScript
        run: npm run build
        working-directory: functions

      # Workload Identity Federation — no JSON key needed, no key rotation ever.
      # One-time GCP setup (Cloud Shell):
      #   PROJECT_ID="lumi-309ff" PROJECT_NUMBER="140301774847"
      #   SA="github-actions@lumi-309ff.iam.gserviceaccount.com"
      #   REPO="seasu/LUMI"
      #   gcloud iam workload-identity-pools create "github" --project="${PROJECT_ID}" --location="global" --display-name="GitHub Actions"
      #   gcloud iam workload-identity-pools providers create-oidc "github" --project="${PROJECT_ID}" --location="global" --workload-identity-pool="github" --display-name="GitHub" --attribute-mapping="google.subject=assertion.sub,attribute.actor=assertion.actor,attribute.repository=assertion.repository,attribute.repository_owner=assertion.repository_owner" --issuer-uri="https://token.actions.githubusercontent.com"
      #   gcloud iam service-accounts add-iam-policy-binding "${SA}" --project="${PROJECT_ID}" --role="roles/iam.workloadIdentityUser" --member="principalSet://iam.googleapis.com/projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github/attribute.repository/${REPO}"
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/140301774847/locations/global/workloadIdentityPools/github/providers/github'
          service_account: 'github-actions@lumi-309ff.iam.gserviceaccount.com'

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Runtime env for Cloud Functions — written to .env.lumi-309ff before deploy.
      # Apple IAP secrets (APPLE_API_KEY_ID / APPLE_API_ISSUER_ID / APPLE_API_PRIVATE_KEY)
      # are managed via Firebase Secret Manager, NOT this .env file.
      - name: Write runtime env for Firebase deploy
        working-directory: functions
        run: |
          rm -f .env.lumi-309ff
          touch .env.lumi-309ff
          if [ -n "${{ vars.GEMINI_VISION_MODEL }}" ]; then
            printf '%s\n' 'GEMINI_VISION_MODEL=${{ vars.GEMINI_VISION_MODEL }}' >> .env.lumi-309ff
          fi
          if [ -n "${{ vars.GEMINI_EMBEDDING_MODEL }}" ]; then
            printf '%s\n' 'GEMINI_EMBEDDING_MODEL=${{ vars.GEMINI_EMBEDDING_MODEL }}' >> .env.lumi-309ff
          fi

      - name: Deploy Cloud Functions (with trigger migration fallback)
        working-directory: functions
        run: |
          export GOOGLE_OAUTH_ACCESS_TOKEN=$(gcloud auth print-access-token)
          MAX_ATTEMPTS=5
          ATTEMPT=1

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "Deploy attempt ${ATTEMPT}/${MAX_ATTEMPTS}"

            set +e
            DEPLOY_OUTPUT=$(
              npx firebase deploy --only functions \
                --project lumi-309ff --non-interactive --force 2>&1
            )
            DEPLOY_STATUS=$?
            set -e

            echo "$DEPLOY_OUTPUT"

            if [ "$DEPLOY_STATUS" -eq 0 ]; then
              exit 0
            fi

            MIGRATION_TARGETS=$(
              DEPLOY_OUTPUT="$DEPLOY_OUTPUT" python3 -c 'import os,re; t=os.environ.get("DEPLOY_OUTPUT",""); t=re.sub(r"\x1B\[[0-?]*[ -/]*[@-~]","",t); p=re.compile(r"^Error:\s+\[([^\(\]\r\n]+)\(([^)\r\n]+)\)\]\s+Changing from an HTTPS function to a background triggered function is not allowed", re.MULTILINE); q=sorted({(a.strip(),b.strip()) for a,b in p.findall(t)}); print("\n".join(f"{a}|{b}" for a,b in q if re.fullmatch(r"[A-Za-z][A-Za-z0-9_-]*",a) and re.fullmatch(r"[a-z0-9-]+",b)))'
            )

            if [ -z "$MIGRATION_TARGETS" ]; then
              exit "$DEPLOY_STATUS"
            fi

            echo "Detected trigger-type migration conflict(s)."
            while IFS='|' read -r FUNCTION_NAME FUNCTION_REGION; do
              [ -z "$FUNCTION_NAME" ] && continue
              echo "Deleting legacy function ${FUNCTION_NAME}(${FUNCTION_REGION}) then retrying."
              set +e
              DELETE_OUTPUT=$(
                npx firebase functions:delete "$FUNCTION_NAME" \
                  --region "$FUNCTION_REGION" --project lumi-309ff --force 2>&1
              )
              DELETE_STATUS=$?
              set -e

              echo "$DELETE_OUTPUT"

              if [ "$DELETE_STATUS" -ne 0 ] && \
                [[ "$DELETE_OUTPUT" != *"The specified filters do not match any existing functions"* ]] && \
                [[ "$DELETE_OUTPUT" != *"do not match any existing functions"* ]]; then
                echo "Failed to delete legacy function ${FUNCTION_NAME}(${FUNCTION_REGION})."
                exit "$DELETE_STATUS"
              fi
            done <<< "$MIGRATION_TARGETS"

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Exceeded retry limit (${MAX_ATTEMPTS}) while resolving trigger migration conflicts."
          exit 1

      - name: Deploy Firestore Rules
        run: |
          export GOOGLE_OAUTH_ACCESS_TOKEN=$(gcloud auth print-access-token)
          npx firebase deploy --only firestore:rules \
            --project lumi-309ff --non-interactive
