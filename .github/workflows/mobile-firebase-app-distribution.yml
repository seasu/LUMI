name: Android Deploy to Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "Firebase Android App ID (optional override)"
        required: false
      tester_groups:
        description: "Comma-separated tester groups"
        required: false
        default: "qa"
      release_notes:
        description: "Release notes"
        required: false
        default: "Automated build from GitHub Actions"

jobs:
  distribute_android:
    name: Build APK and Distribute
    runs-on: ubuntu-latest
    env:
      FLUTTER_VERSION: "3.29.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android project exists
        run: |
          if [ ! -d android ]; then
            echo "Missing android/ directory. Generate mobile platforms first:"
            echo "flutter create . --platforms=ios,android"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

      - name: Decode Firebase Android parameter file (optional)
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 not set; skip decoding google-services.json"
            exit 0
          fi
          mkdir -p android/app
          echo "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Resolve Firebase Android App ID
        id: firebase_params
        env:
          INPUT_APP_ID: ${{ inputs.app_id }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_APP_ID:-}" ]; then
            echo "Using app_id from workflow input"
            echo "app_id=$INPUT_APP_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$FIREBASE_ANDROID_APP_ID" ]; then
            echo "Using app_id from FIREBASE_ANDROID_APP_ID secret"
            echo "app_id=$FIREBASE_ANDROID_APP_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          config_path = Path('android/app/google-services.json')
          if not config_path.exists():
              raise SystemExit(
                  'Unable to resolve Firebase Android app_id. Provide one of: workflow input app_id, '
                  'secret FIREBASE_ANDROID_APP_ID, or secret FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64.'
              )

          data = json.loads(config_path.read_text(encoding='utf-8'))
          clients = data.get('client') or []
          if not clients:
              raise SystemExit('No client entries found in android/app/google-services.json.')

          app_id = clients[0].get('client_info', {}).get('mobilesdk_app_id', '').strip()
          if not app_id:
              raise SystemExit('mobilesdk_app_id not found in android/app/google-services.json.')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"app_id={app_id}\n")
          PY

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ steps.firebase_params.outputs.app_id }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: ${{ inputs.tester_groups }}
          releaseNotes: ${{ inputs.release_notes }}
          file: build/app/outputs/flutter-apk/app-release.apk
