name: Android Deploy to Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      tester_groups:
        description: "Comma-separated tester groups"
        required: false
        default: "qa"
      release_notes:
        description: "Release notes"
        required: false
        default: "Automated build from GitHub Actions"

jobs:
  distribute_android:
    name: Build APK and Distribute
    runs-on: ubuntu-latest
    env:
      FLUTTER_VERSION: "3.29.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android project exists
        run: |
          if [ ! -d android ]; then
            echo "Missing android/ directory. Generate mobile platforms first:"
            echo "flutter create . --platforms=ios,android"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64, os, pathlib, sys
          raw = os.environ.get("ANDROID_KEYSTORE_BASE64", "")
          raw = "".join(raw.split())
          raw += "=" * (-len(raw) % 4)
          try:
            data = base64.b64decode(raw)
          except Exception as e:
            sys.exit(f"ANDROID_KEYSTORE_BASE64 is not valid base64: {e}")
          pathlib.Path("android/upload-keystore.jks").write_bytes(data)
          print("upload-keystore.jks decoded successfully")
          PY

      - name: Decode Firebase Android parameter file
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "Missing secret: FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64"
            exit 1
          fi
          mkdir -p android/app
          python3 - <<'PY'
          import base64, os, pathlib, sys
          raw = os.environ["FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64"]
          raw = "".join(raw.split())          # strip all whitespace
          raw += "=" * (-len(raw) % 4)        # fix missing padding
          try:
            data = base64.b64decode(raw)
          except Exception as e:
            sys.exit(f"FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 is not valid base64: {e}\n"
                     "Re-encode with: base64 -w 0 google-services.json")
          pathlib.Path("android/app/google-services.json").write_bytes(data)
          print("google-services.json decoded successfully")
          PY

      - name: Resolve Firebase Android App ID from parameter file
        id: firebase_params
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          config_path = Path('android/app/google-services.json')
          if not config_path.exists():
            raise SystemExit('Missing android/app/google-services.json. Please provide Firebase parameter file before running this workflow.')

          data = json.loads(config_path.read_text(encoding='utf-8'))
          clients = data.get('client') or []
          if not clients:
            raise SystemExit('No client entries found in android/app/google-services.json.')

          app_id = clients[0].get('client_info', {}).get('mobilesdk_app_id', '').strip()
          if not app_id:
            raise SystemExit('mobilesdk_app_id not found in android/app/google-services.json.')

          with open(Path(__import__('os').environ['GITHUB_OUTPUT']), 'a', encoding='utf-8') as fh:
            fh.write(f"app_id={app_id}\n")
          PY

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ steps.firebase_params.outputs.app_id }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: ${{ github.event.inputs.tester_groups }}
          releaseNotes: ${{ github.event.inputs.release_notes }}
          file: build/app/outputs/flutter-apk/app-release.apk
