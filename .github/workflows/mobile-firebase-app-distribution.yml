name: Android Deploy to Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "Firebase Android App ID (e.g. 1:1234567890:android:abcdef)"
        required: true
      tester_groups:
        description: "Comma-separated tester groups"
        required: false
        default: "qa"
      release_notes:
        description: "Release notes"
        required: false
        default: "Automated build from GitHub Actions"

jobs:
  distribute_android:
    name: Build APK and Distribute
    runs-on: ubuntu-latest
    env:
      FLUTTER_VERSION: "3.29.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android project exists
        run: |
          if [ ! -d android ]; then
            echo "Missing android/ directory. Generate mobile platforms first:"
            echo "flutter create . --platforms=ios,android"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ github.event.inputs.app_id }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: ${{ github.event.inputs.tester_groups }}
          releaseNotes: ${{ github.event.inputs.release_notes }}
          file: build/app/outputs/flutter-apk/app-release.apk
