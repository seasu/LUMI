name: iOS Deploy to TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for this build"
        required: false
        default: "Automated build from GitHub Actions"

jobs:
  deploy_testflight:
    name: Build IPA and Upload to TestFlight
    runs-on: macos-15
    env:
      FLUTTER_VERSION: "3.29.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Check required secrets
        env:
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          missing=()
          [ -z "$IOS_DISTRIBUTION_CERT_BASE64" ]       && missing+=("IOS_DISTRIBUTION_CERT_BASE64")
          [ -z "$IOS_DISTRIBUTION_CERT_PASSWORD" ]      && missing+=("IOS_DISTRIBUTION_CERT_PASSWORD")
          [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]     && missing+=("IOS_PROVISIONING_PROFILE_BASE64")
          [ -z "$IOS_PROVISIONING_PROFILE_NAME" ]       && missing+=("IOS_PROVISIONING_PROFILE_NAME")
          [ -z "$IOS_TEAM_ID" ]                         && missing+=("IOS_TEAM_ID")
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]         && missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [ -z "$APP_STORE_CONNECT_KEY_ID" ]            && missing+=("APP_STORE_CONNECT_KEY_ID")
          [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]       && missing+=("APP_STORE_CONNECT_PRIVATE_KEY")
          [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]           && missing+=("GOOGLE_SERVICE_INFO_PLIST")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            for s in "${missing[@]}"; do echo "   - $s"; done
            echo ""
            echo "Set these in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Validate iOS project exists
        run: |
          if [ ! -d ios ]; then
            echo "Missing ios/ directory. Generate mobile platforms first:"
            echo "flutter create . --platforms=ios,android"
            exit 1
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "❌ GOOGLE_SERVICE_INFO_PLIST secret is missing"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
          echo "✅ GoogleService-Info.plist written"

      - name: Validate GoogleService-Info.plist
        run: |
          /usr/bin/plutil -lint ios/Runner/GoogleService-Info.plist \
            && echo "✅ plist syntax OK" \
            || (echo "❌ GoogleService-Info.plist is not valid XML — re-paste the file content into the secret" && exit 1)
          # Verify it has the expected Firebase keys
          /usr/libexec/PlistBuddy -c "Print :PROJECT_ID" ios/Runner/GoogleService-Info.plist \
            && echo "✅ PROJECT_ID present" \
            || (echo "❌ PROJECT_ID missing — wrong plist content?" && exit 1)

      - name: Inject REVERSED_CLIENT_ID into Info.plist URL scheme
        run: |
          REVERSED_CLIENT_ID=$(/usr/libexec/PlistBuddy \
            -c "Print :REVERSED_CLIENT_ID" \
            ios/Runner/GoogleService-Info.plist 2>/dev/null || echo "")
          if [ -z "$REVERSED_CLIENT_ID" ]; then
            echo "❌ REVERSED_CLIENT_ID not found in GoogleService-Info.plist"
            exit 1
          fi
          echo "REVERSED_CLIENT_ID=${REVERSED_CLIENT_ID:0:30}…"
          /usr/libexec/PlistBuddy \
            -c "Add :CFBundleURLTypes array" \
            ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Add :CFBundleURLTypes:0 dict" \
            ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" \
            ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $REVERSED_CLIENT_ID" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleURLTypes:0:CFBundleURLSchemes:0 $REVERSED_CLIENT_ID" \
            ios/Runner/Info.plist
          echo "✅ CFBundleURLTypes injected"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          python3 - <<'PY'
          import base64, os, pathlib, sys, subprocess

          raw = os.environ.get("IOS_PROVISIONING_PROFILE_BASE64", "")
          if not raw.strip():
              sys.exit("Missing secret: IOS_PROVISIONING_PROFILE_BASE64")
          raw = "".join(raw.split())
          raw += "=" * (-len(raw) % 4)
          try:
              data = base64.b64decode(raw)
          except Exception as e:
              sys.exit(f"IOS_PROVISIONING_PROFILE_BASE64 is not valid base64: {e}")

          profiles_dir = pathlib.Path.home() / "Library/MobileDevice/Provisioning Profiles"
          profiles_dir.mkdir(parents=True, exist_ok=True)
          profile_path = profiles_dir / "app.mobileprovision"
          profile_path.write_bytes(data)
          print(f"Provisioning profile installed to {profile_path}")
          PY

      - name: Build IPA
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          # Inject manual signing settings into xcconfig so xcodebuild archive picks them up
          cat >> ios/Flutter/Release.xcconfig << EOF
          CODE_SIGN_STYLE = Manual
          DEVELOPMENT_TEAM = ${IOS_TEAM_ID}
          CODE_SIGN_IDENTITY = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = ${IOS_PROVISIONING_PROFILE_NAME}
          EOF

          # Extract Firebase config from plist and pass as dart-defines.
          # This avoids needing GoogleService-Info.plist in the Xcode bundle
          # (the file is written to disk but never added to project.pbxproj).
          PL="ios/Runner/GoogleService-Info.plist"
          FIREBASE_IOS_API_KEY=$(/usr/libexec/PlistBuddy -c "Print :API_KEY"          "$PL")
          FIREBASE_IOS_APP_ID=$(/usr/libexec/PlistBuddy  -c "Print :GOOGLE_APP_ID"    "$PL")
          FIREBASE_IOS_SENDER=$(/usr/libexec/PlistBuddy  -c "Print :GCM_SENDER_ID"    "$PL")
          FIREBASE_IOS_PROJ=$(/usr/libexec/PlistBuddy    -c "Print :PROJECT_ID"       "$PL")
          FIREBASE_IOS_BUCKET=$(/usr/libexec/PlistBuddy  -c "Print :STORAGE_BUCKET"   "$PL")
          FIREBASE_IOS_CLIENT=$(/usr/libexec/PlistBuddy  -c "Print :CLIENT_ID"        "$PL")

          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]' | cut -d'+' -f1)
          flutter build ipa --release \
            --dart-define=FIREBASE_IOS_API_KEY="$FIREBASE_IOS_API_KEY" \
            --dart-define=FIREBASE_IOS_APP_ID="$FIREBASE_IOS_APP_ID" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="$FIREBASE_IOS_SENDER" \
            --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_IOS_PROJ" \
            --dart-define=FIREBASE_STORAGE_BUCKET="$FIREBASE_IOS_BUCKET" \
            --dart-define=FIREBASE_IOS_CLIENT_ID="$FIREBASE_IOS_CLIENT" \
            --dart-define=GOOGLE_CLIENT_ID="$FIREBASE_IOS_CLIENT" \
            --dart-define=APP_SEMVER="$SEMVER" \
            --dart-define=APP_BUILD_NUMBER="$BUILD_NUMBER" \
            --build-number="$BUILD_NUMBER"

      - name: Export IPA
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          python3 - <<'PY'
          import os, pathlib, plistlib
          team_id = os.environ["IOS_TEAM_ID"]
          profile_name = os.environ["IOS_PROVISIONING_PROFILE_NAME"]
          plist = {
              "method": "app-store",
              "teamID": team_id,
              "uploadBitcode": False,
              "uploadSymbols": True,
              "signingStyle": "manual",
              "provisioningProfiles": {"io.github.seasu.lumi": profile_name},
          }
          pathlib.Path("/tmp/ExportOptions.plist").write_bytes(plistlib.dumps(plist))
          print(f"ExportOptions.plist written: team={team_id}, profile={profile_name}")
          PY
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Locate IPA
        id: locate_ipa
        run: |
          echo "=== build/ios/ tree ==="
          find build/ios -type f 2>/dev/null || echo "(empty)"
          IPA_PATH=$(find build/ios -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found anywhere under build/ios/"
            exit 1
          fi
          echo "Found: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.locate_ipa.outputs.ipa_path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
