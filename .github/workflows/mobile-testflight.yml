name: iOS Deploy to TestFlight

on:
  push:
    branches:
      - main
    paths:
      - "lib/**"
      - "ios/**"
      - "pubspec.yaml"
      - "pubspec.lock"
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for this build"
        required: false
        default: "Automated build from GitHub Actions"

jobs:
  deploy_testflight:
    name: Build IPA and Upload to TestFlight
    runs-on: macos-latest
    env:
      FLUTTER_VERSION: "3.29.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        env:
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          missing=()
          [ -z "$IOS_DISTRIBUTION_CERT_BASE64" ]           && missing+=("IOS_DISTRIBUTION_CERT_BASE64")
          [ -z "$IOS_DISTRIBUTION_CERT_PASSWORD" ]          && missing+=("IOS_DISTRIBUTION_CERT_PASSWORD")
          [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]         && missing+=("IOS_PROVISIONING_PROFILE_BASE64")
          [ -z "$IOS_PROVISIONING_PROFILE_NAME" ]           && missing+=("IOS_PROVISIONING_PROFILE_NAME")
          [ -z "$IOS_TEAM_ID" ]                             && missing+=("IOS_TEAM_ID")
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]             && missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [ -z "$APP_STORE_CONNECT_KEY_ID" ]                && missing+=("APP_STORE_CONNECT_KEY_ID")
          [ -z "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" ]    && missing+=("APP_STORE_CONNECT_PRIVATE_KEY_BASE64")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            for s in "${missing[@]}"; do echo "   - $s"; done
            echo ""
            echo "Set these in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Validate iOS project exists
        run: |
          if [ ! -d ios ]; then
            echo "Missing ios/ directory. Generate mobile platforms first:"
            echo "flutter create . --platforms=ios,android"
            exit 1
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          python3 - <<'PY'
          import base64, os, pathlib, sys, subprocess

          raw = os.environ.get("IOS_PROVISIONING_PROFILE_BASE64", "")
          if not raw.strip():
              sys.exit("Missing secret: IOS_PROVISIONING_PROFILE_BASE64")
          raw = "".join(raw.split())
          raw += "=" * (-len(raw) % 4)
          try:
              data = base64.b64decode(raw)
          except Exception as e:
              sys.exit(f"IOS_PROVISIONING_PROFILE_BASE64 is not valid base64: {e}")

          profiles_dir = pathlib.Path.home() / "Library/MobileDevice/Provisioning Profiles"
          profiles_dir.mkdir(parents=True, exist_ok=True)
          profile_path = profiles_dir / "app.mobileprovision"
          profile_path.write_bytes(data)
          print(f"Provisioning profile installed to {profile_path}")
          PY

      - name: Build IPA
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          # Inject manual signing settings into xcconfig so xcodebuild archive picks them up
          cat >> ios/Flutter/Release.xcconfig << EOF
          CODE_SIGN_STYLE = Manual
          DEVELOPMENT_TEAM = ${IOS_TEAM_ID}
          CODE_SIGN_IDENTITY = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = ${IOS_PROVISIONING_PROFILE_NAME}
          EOF

          # Archive only (flutter build ipa without --export-options-plist)
          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]' | cut -d'+' -f1)
          flutter build ipa --release \
            --dart-define=APP_SEMVER="$SEMVER" \
            --dart-define=APP_BUILD_NUMBER="$BUILD_NUMBER" \
            --build-number="$BUILD_NUMBER"

      - name: Export IPA
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          python3 - <<'PY'
          import os, pathlib, plistlib
          team_id = os.environ["IOS_TEAM_ID"]
          profile_name = os.environ["IOS_PROVISIONING_PROFILE_NAME"]
          plist = {
              "method": "app-store",
              "teamID": team_id,
              "uploadBitcode": False,
              "uploadSymbols": True,
              "signingStyle": "manual",
              "provisioningProfiles": {"io.github.seasu.lumi": profile_name},
          }
          pathlib.Path("/tmp/ExportOptions.plist").write_bytes(plistlib.dumps(plist))
          print(f"ExportOptions.plist written: team={team_id}, profile={profile_name}")
          PY
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Locate IPA
        id: locate_ipa
        run: |
          echo "=== build/ios/ tree ==="
          find build/ios -type f 2>/dev/null || echo "(empty)"
          IPA_PATH=$(find build/ios -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found anywhere under build/ios/"
            exit 1
          fi
          echo "Found: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
          IPA_PATH: ${{ steps.locate_ipa.outputs.ipa_path }}
        run: |
          python3 - <<'PY'
          import base64, os, pathlib, sys
          raw = os.environ.get("APP_STORE_CONNECT_PRIVATE_KEY_BASE64", "")
          if not raw.strip():
              sys.exit("Missing secret: APP_STORE_CONNECT_PRIVATE_KEY_BASE64")
          raw = "".join(raw.split())
          raw += "=" * (-len(raw) % 4)
          try:
              data = base64.b64decode(raw)
          except Exception as e:
              sys.exit(f"APP_STORE_CONNECT_PRIVATE_KEY_BASE64 is not valid base64: {e}\n"
                       "Re-encode with: base64 -i AuthKey_XXXX.p8 | tr -d '\\n'")
          key_id = os.environ["APP_STORE_CONNECT_KEY_ID"]
          key_path = pathlib.Path.home() / ".private_keys" / f"AuthKey_{key_id}.p8"
          key_path.parent.mkdir(parents=True, exist_ok=True)
          key_path.write_bytes(data)
          print(f"API key written to {key_path}")
          PY
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey  "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose
