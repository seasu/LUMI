name: Secret Scan

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "cursor/**"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
