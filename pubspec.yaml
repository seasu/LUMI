name: lumi
description: Light up your wardrobe with Google Photos.
publish_to: 'none'
version: 1.0.45+134

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_crashlytics: ^4.1.0
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1
  cloud_functions: ^5.1.0
  image_picker: ^1.1.2
  share_plus: ^10.0.2
  http: ^1.2.0
  google_fonts: ^6.2.1
  web: ^1.1.1
  path_provider: ^2.1.0
  uuid: ^4.4.0
  sign_in_with_apple: ^6.1.2
  crypto: ^3.0.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  fake_cloud_firestore: ^3.0.2
  firebase_auth_mocks: ^0.14.0
  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: false
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
  fonts:
    - family: DancingScript
      fonts:
        - asset: fonts/Dancing_Script/static/DancingScript-Regular.ttf
          weight: 400
        - asset: fonts/Dancing_Script/static/DancingScript-Medium.ttf
          weight: 500
        - asset: fonts/Dancing_Script/static/DancingScript-SemiBold.ttf
          weight: 600
        - asset: fonts/Dancing_Script/static/DancingScript-Bold.ttf
          weight: 700
