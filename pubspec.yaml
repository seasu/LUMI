name: lumi
description: Light up your wardrobe with Google Photos.
publish_to: 'none'
version: 1.0.0+17

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1
  cloud_functions: ^5.1.0
  image_picker: ^1.1.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  fake_cloud_firestore: ^3.0.2
  firebase_auth_mocks: ^0.14.0

flutter:
  uses-material-design: true
