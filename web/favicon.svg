<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="spark" cx="72%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#F5A855" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#F08630" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F08630" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Cream rounded square background -->
  <rect width="100" height="100" rx="22" fill="#FAF4EE"/>
  <!-- Orange sparkle glow overlay -->
  <rect width="100" height="100" rx="22" fill="url(#spark)"/>
  <!-- Italic "L" in warm dark brown -->
  <text
    x="14"
    y="76"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="72"
    font-weight="400"
    fill="#3A2010"
    letter-spacing="-2"
  >L</text>
  <!-- Sparkle star center dot -->
  <circle cx="72" cy="28" r="3.5" fill="#F08630" opacity="0.85"/>
</svg>
