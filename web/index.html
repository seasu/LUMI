<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Ask browsers to revalidate this HTML shell so new deploys are picked up sooner. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="Light up your wardrobe with Google Photos.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumi</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      /* LumiColors.base / DESIGN.md Gallery Bone */
      background-color: #FAF9F8;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <script>
    // Force-disable old PWA caches so browser reload gets latest deploy.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        registrations.forEach((registration) => registration.unregister());
      });
    }
    if ('caches' in window) {
      caches.keys().then((keys) => {
        keys.forEach((key) => caches.delete(key));
      });
    }
  </script>
  <script src="flutter_bootstrap.js?v=__BUILD_VERSION__" async></script>
</body>
</html>
